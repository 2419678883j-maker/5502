<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>生成实验室 / AI与平面设计</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="site.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script><script src="app.js" defer></script></head><body><div id="p5-frame" aria-hidden="true"><div id="p5-background"></div></div><main class="site grid"><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">A</span>AI / GD</a><button class="menu-toggle" aria-expanded="false">MENU</button><nav class="nav"><a href="index.html">首页</a><a href="practice.html">方法</a><a aria-current="page" href="lab.html">实验室</a><a href="archive.html">档案</a><a href="notes.html">笔记</a><a href="contact.html">联系</a></nav><span class="kicker">03—06 / 2026</span></header><section class="page-hero"><p class="kicker">Generative Lab / 03</p><h1 class="display jitter-title">拖动秩序，<br><em>释放变量。</em></h1><p>这是一个微型海报生成器。拖动海报，或改变参数，观察固定网格如何容纳随机的视觉结果。</p></section><section class="section"><div class="lab"><div class="lab-stage" id="lab-stage"><div class="poster" id="poster"><span>AI / GD<br>POSTER 01</span><strong id="poster-word">ORDER<br>CHAOS</strong><span>DRAG / TUNE / REPEAT</span><i class="disc"></i></div></div><div class="lab-controls"><p class="kicker">实时控制</p><h2 class="display">一个小小的<br>生成系统。</h2><div class="control"><label for="hue">克莱因蓝密度</label><input id="hue" type="range" min="0" max="100" value="70"></div><div class="control"><label for="angle">失序角度</label><input id="angle" type="range" min="-12" max="12" value="-3"></div><div class="control"><label for="word">视觉指令</label><select id="word"><option value="ORDER|CHAOS">ORDER / CHAOS</option><option value="HUMAN|MACHINE">HUMAN / MACHINE</option><option value="GRID|NOISE">GRID / NOISE</option></select></div><button id="shuffle" class="button blue magnetic">生成新版本 ↻</button><p class="lab-note">提示：点击“生成新版本”会随机重组配色与微妙的方向；直接拖拽海报，则可让直觉覆盖算法。</p></div></div></section><footer class="footer"><span>© 2026 [你的名字] · 设计实验</span><a href="archive.html">下一页：作品档案 ↗</a></footer></main><script>window.addEventListener('DOMContentLoaded',()=>{const poster=document.getElementById('poster'),hue=document.getElementById('hue'),angle=document.getElementById('angle'),word=document.getElementById('word'),shuffle=document.getElementById('shuffle'),term=document.getElementById('poster-word');const palettes=[['#002fa7','#fff','#d8ff00'],['#000','#fff','#002fa7'],['#fff','#000','#002fa7'],['#d8ff00','#000','#002fa7']];let moveX=0,moveY=0;const draw=()=>{const p=palettes[Math.min(3,Math.floor(+hue.value/25))];poster.style.setProperty('--poster-bg',p[0]);poster.style.setProperty('--poster-text',p[1]);poster.style.setProperty('--poster-accent',p[2]);poster.style.transform=`translate(calc(-50% + ${moveX}px),calc(-50% + ${moveY}px)) rotate(${angle.value}deg)`;term.innerHTML=word.value.replace('|','<br>')};[hue,angle,word].forEach(el=>el.addEventListener('input',draw));shuffle.addEventListener('click',()=>{hue.value=Math.floor(Math.random()*101);angle.value=Math.floor(Math.random()*25-12);word.selectedIndex=Math.floor(Math.random()*word.options.length);moveX=Math.floor(Math.random()*80-40);moveY=Math.floor(Math.random()*70-35);draw()});poster.addEventListener('pointerdown',e=>{poster.setPointerCapture(e.pointerId);poster.classList.add('dragging');const r=poster.getBoundingClientRect(),startX=e.clientX,startY=e.clientY,baseX=moveX,baseY=moveY;const drag=q=>{moveX=baseX+q.clientX-startX;moveY=baseY+q.clientY-startY;draw()};poster.addEventListener('pointermove',drag);poster.addEventListener('pointerup',()=>{poster.classList.remove('dragging');poster.removeEventListener('pointermove',drag)},{once:true})});draw()})</script></body></html>
